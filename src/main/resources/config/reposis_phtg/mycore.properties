# The following properties are required for phtg (productive) deployment.
# For productive deployment, all properties must be configured or enabled.
# Only relevant properties should be listed here; otherwise, they should be deleted.
# Unless otherwise specified, empty properties are relevant and must be configured.
# Temporary disabled properties require further configuration or other dependencies.

##############################################################################
# Basic                                                                      #
##############################################################################
# Configure base url, e.g. http://domain:port, without '/'. Temporary disabled to use default.
#MCR.baseurl=
# Requires MCR.baseurl, therefore temporary disabled.
#MIR.CanonicalBaseURL=%MCR.baseurl%/
MCR.NameOfProject=phtg
MIR.projectid.default=phtg
MCR.Metadata.Languages=de
MIR.testEnvironment=false

##############################################################################
# Email                                                                      #
##############################################################################
MCR.Mail.Server=
# Editor mail addresses for messages, e.g. mail@domain0,amail@domain1,..n.
MCR.Mail.Address=
# General sender mail address, e.g. mail@domain
MCR.Mail.Sender=

# Sender email for events, e.g. <name> mail@domain
MCR.mir-module.MailSender=
# Mail for events including self registration, e.g. <name> mail@domain
MCR.mir-module.EditorMail=

##############################################################################
# Access Control                                                             #
##############################################################################
# Access keys are not relevant and must therefore be deactivated as follows.
MCR.ACL.AccessKey.Strategy.AllowedObjectTypes=
MIR.Access.Strategy.Classifications=mir_access,state

##############################################################################
# DOI                                                                        #
##############################################################################
MCR.DOI.Prefix=10.57668
MCR.DOI.HostingInstitution=Publikationsserver der P\u00E4dagogischen Hochschule Thurgau

# Configuration is required, therefore service temporary disabled.
#MCR.PI.Service.Datacite=org.mycore.pi.doi.MCRDOIService
MCR.PI.Service.Datacite.MetadataService=MODSDOI
MCR.PI.Service.Datacite.RegisterBaseURL=%MCR.baseurl%
MCR.PI.Service.Datacite.Username=
MCR.PI.Service.Datacite.Password=
MCR.PI.Service.Datacite.RegistrationPredicate=org.mycore.pi.condition.MCRPIPublishedPredicate
MCR.PI.Service.Datacite.RegisterURLContext=receive/$ID
MCR.PI.Service.Datacite.Transformer=datacite
MCR.PI.Service.Datacite.Generator=phtgDOI

MCR.PI.Generator.phtgDOI=org.mycore.pi.MCRGenericPIGenerator
MCR.PI.Generator.phtgDOI.GeneralPattern=%MCR.DOI.Prefix%/phtg-$Count
MCR.PI.Generator.phtgDOI.CountPrecision=6
MCR.PI.Generator.phtgDOI.Type=doi

MCR.PI.MetadataService.MODSDOI=org.mycore.mods.identifier.MCRMODSDOIMetadataService
MCR.PI.MetadataService.MODSDOI.Prefix=%MCR.DOI.Prefix%

##############################################################################
# URN                                                                        #
##############################################################################
MCR.PI.MetadataService.MODSURN.Prefix=urn:nbn:de:notconfigured
MCR.PI.Generator.TypeYearCountURN.GeneralPattern=%MCR.PI.MetadataService.MODSURN.Prefix%-$ObjectDate-$Count-
MCR.PI.Generator.TypeYearCountURN.DateFormat=yyyyMMdd
MCR.PI.Generator.TypeYearCountURN.CountPrecision=3

##############################################################################
# OAI Data Provider                                                          #
##############################################################################
MCR.OAIDataProvider.OAI2.RepositoryName=Publikationsserver der PHTG
MCR.OAIDataProvider.OAI2.RepositoryIdentifier=%MCR.baseurl%/
MCR.OAIDataProvider.OAI2.AdminEmail=
MCR.OAIDataProvider.OAI2.RecordSampleID=%MIR.projectid.default%_mods_00000321
MCR.OAIDataProvider.OAI2.DescriptionURI.EPrints=webapp:oai/oai-eprints.xml
MCR.OAIDataProvider.OAI2.DescriptionURI.Rights=webapp:oai/oai-rights.xml

# Switch to DINI2022 conformity
MIR.xMetaDissPlus.diniPublType.classificationId=diniPublType2022
MIR.dc.diniPublType.classificationId=diniPublType2022
MIR.dc.ignoredClassificationIds=diniPublType
MCR.OAIDataProvider.OAI2.Sets.doc-type.URI=xslStyle:classification2sets:classification:metadata:2:children:diniPublType2022
MCR.OAIDataProvider.OAI2.Sets.doc-type.Classification=diniPublType2022

##############################################################################
# ePuSta                                                                     #
##############################################################################
# ePuSta endpoint is required, therefore temporarily disabled.
#MIR.ePuSta=show
MIR.ePuSta.providerURL=

##############################################################################
# Editor                                                                     #
##############################################################################
MIR.EditorForms.CustomIncludes=%MIR.EditorForms.CustomIncludes%,xslStyle:editor/mir2xeditor:webapp:editor/editor-customization.xed

##############################################################################
# Frontend                                                                   #
##############################################################################
MIR.CustomLayout.JS=project.js
MIR.Layout.Start=mir-abstract-badges,mir-workflow,mir-abstract-title,mir-abstract-plus,toc,mir-file-upload,mir-viewer,mir-player,mir-collapse-files,mir-metadata,phtg-metadata
MCR.URIResolver.xslImports.modsmeta=%MCR.URIResolver.xslImports.modsmeta%,metadata/phtg-metadata.xsl
MCR.Filter.UserAgent.AcceptInvalid=true

##############################################################################
# Enrichment                                                                 #
##############################################################################
MIR.OADOI.Mail.Address=

##############################################################################
# CSL                                                                        #
##############################################################################
MCR.Export.CSL.Styles=apa-cv,ieee,elsevier-harvard,springer-basic-author-date,din-1505-2
MIR.defaultCitationStyle=apa-cv

MCR.ContentTransformer.modsList2cslmdpure.Class=org.mycore.csl.MCRCSLTransformer
MCR.ContentTransformer.modsList2cslmdpure.format=markdown-pure
MCR.ContentTransformer.modsList2cslmdpure.style=apa-cv
MCR.ContentTransformer.modsList2cslmdpure.ItemProviderClass=org.mycore.mods.csl.MCRListModsItemDataProvider
MCR.ContentTransformer.modsList2cslmdpure.MIMEType=text/plain; charset\="UTF-8"

MCR.ContentTransformer.modsList2cslmdhtml.Class=org.mycore.csl.MCRCSLTransformer
MCR.ContentTransformer.modsList2cslmdhtml.format=markdown
MCR.ContentTransformer.modsList2cslmdhtml.style=apa-cv
MCR.ContentTransformer.modsList2cslmdhtml.ItemProviderClass=org.mycore.mods.csl.MCRListModsItemDataProvider
MCR.ContentTransformer.modsList2cslmdhtml.MIMEType=text/plain; charset\="UTF-8"

MCR.ContentTransformer.response-csl-mdhtml.Class=org.mycore.common.content.transformer.MCRTransformerPipe
MCR.ContentTransformer.response-csl-mdhtml.Steps=response-objectList,modsList2cslmdhtml

MCR.ContentTransformer.response-csl-mdpure.Class=org.mycore.common.content.transformer.MCRTransformerPipe
MCR.ContentTransformer.response-csl-mdpure.Steps=response-objectList,modsList2cslmdpure

##############################################################################
# Solr                                                                       #
##############################################################################
MCR.Solr.NestedDocuments=true

##############################################################################
# ReCaptcha                                                                  #
##############################################################################
MIR.ReCaptcha.secret.key=
MIR.ReCaptcha.site.key=

##############################################################################
# Agreement                                                                  #
##############################################################################
MCR.EventHandler.MCRObject.019j.Class=de.gbv.reposis.agreement.VZGMailAgreementEventHandler
MIR.EditorForms.CustomIncludes=%MIR.EditorForms.CustomIncludes%,xslStyle:editor/mir2xeditor:webapp:editor/editor-agreement-customization.xed
MIR.Agreement.Genres.Skip=journal,series,collection,newspaper,series,bachelor_thesis,master_thesis,matura
MIR.Agreement.File=Einverstaendniserklaerung_20220317_v2.0.pdf
MIR.Agreement.MailTemplate=agreement_mail_template_phtg.xhtml

##############################################################################
#  Batch Editor                                                              #
##############################################################################
MCR.BatchEditor.research_area.Path2Remove=mods:classification[@valueURI="https://www.publikationsserver.phtg.ch/classifications/research_areas#{0}"]
MCR.BatchEditor.research_area.Path2Add=mods:classification[@authorityURI="https://www.publikationsserver.phtg.ch/classifications/research_areas"][@displayLabel="research_areas"][@valueURI="https://www.publikationsserver.phtg.ch/classifications/research_areas#{0}"]
MCR.BatchEditor.institute.Path2Remove=mods:name[@valueURI="https://publikationsserver.phtg.ch/classifications/mir_institutes#{0}"]
MCR.BatchEditor.institute.Path2Add=mods:name[@authorityURI="https://publikationsserver.phtg.ch/classifications/mir_institutes"][@type="corporate"][@valueURI="https://publikationsserver.phtg.ch/classifications/mir_institutes#{0}"][mods:role/mods:roleTerm[@authority="marcrelator"][@type="code"][text()="his"]]
